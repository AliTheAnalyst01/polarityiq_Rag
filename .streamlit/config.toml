[theme]
base            = "dark"
primaryColor    = "#7bc8f6"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor       = "#e6edf3"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
maxUploadSize   = 10

[browser]
gatherUsageStats = false
